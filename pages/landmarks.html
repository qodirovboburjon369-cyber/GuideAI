<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GuideAI — Landmarks</title>
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}</script>
  <link rel="stylesheet" href="/css/styles.css"/>
  <link rel="stylesheet" href="/css/landmarks.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <script src="https://api-maps.yandex.ru/2.1/?lang=en_US" type="text/javascript"></script>
</head>
<body class="landmarks-page-body">

<header data-aos="fade-down" data-aos-easing="linear" data-aos-duration="1500" class="header">
  <div class="header__wrapper">
    <div class="header__logobox">
      <div class="iconbx">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
          <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
            <path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594zM20 2v4m2-2h-4"/>
            <circle cx="4" cy="20" r="2"/>
          </g>
        </svg>
      </div>
      <p class="logogtext">GuideAI</p>
    </div>
    <ul class="header__list">
      <li><a href="/index.html" class="header__link"><i class="fa-solid fa-house"></i>Home</a></li>
      <li><a href="/pages/ai.html" class="header__link"><i class="fa-solid fa-brain"></i>AI <span class="nav-new">NEW</span></a></li>
      <li><a href="/pages/map.html" class="header__link"><i class="fa-solid fa-map"></i>Map</a></li>
      <li><a href="/pages/landmarks.html" class="header__link"><i class="fa-solid fa-landmark"></i>Landmarks <span class="nav-new">NEW</span></a></li>
      <li><a href="/pages/trip.html" class="header__link"><i class="fa-solid fa-suitcase-rolling"></i>Trip</a></li>
    </ul>
    <div class="header__right">
      <button class="lightmode"><i class="fa-solid fa-sun"></i></button>
      <div class="header__btnbox">
        <button class="header__login">Login</button>
        <button class="header__sign">Sign Up</button>
      </div>
    </div>
  </div>
</header>

<div class="lm-page">

  <aside class="lm-sidebar">
    <div class="lm-sidebar__top">
      <div class="lm-sidebar__title">UZBEKISTAN LANDMARKS</div>
      <div class="lm-search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search landmark or city..."/>
      </div>
      <div class="lm-filters">
        <button class="lm-filter active" data-f="all">All</button>
        <button class="lm-filter" data-f="mosque">Mosque</button>
        <button class="lm-filter" data-f="mausoleum">Mausoleum</button>
        <button class="lm-filter" data-f="complex">Complex</button>
        <button class="lm-filter" data-f="fortress">Fortress</button>
      </div>
    </div>
    <p class="lm-sidebar__count" id="lmCount"></p>
    <div class="lm-list" id="landmarkList"></div>
  </aside>

  <div class="lm-map">
    <div id="lmMap"></div>
  </div>

  <div class="lm-detail" id="detailPanel">
    <button class="lm-detail__close" id="closeDetail"><i class="fa-solid fa-xmark"></i></button>
    <div class="lm-detail__inner">
      <div class="lm-detail__img-wrap">
        <img id="detailImg" src="" alt=""/>
        <div class="lm-detail__era" id="detailEra"></div>
      </div>
      <div class="lm-detail__content">
        <div class="lm-detail__info">
          <div class="lm-detail__head">
            <div>
              <div class="lm-detail__name" id="detailName"></div>
              <div class="lm-detail__meta">
                <span><i class="fa-solid fa-location-dot"></i><span id="detailCity"></span></span>
                <span><i class="fa-solid fa-clock-rotate-left"></i><span id="detailYear"></span></span>
              </div>
            </div>
            <div class="lm-detail__badge" id="detailCategory"></div>
          </div>
          <p class="lm-detail__desc" id="detailDesc"></p>
          <div class="lm-detail__facts" id="detailFacts"></div>
        </div>
        <div class="lm-detail__actions">
          <button class="lm-3d-btn" id="show3dBtn">
            <i class="fa-solid fa-cube"></i> Show 3D Model
          </button>
          <button class="lm-ai-btn" onclick="window.location.href='/pages/ai.html'">
            <i class="fa-solid fa-brain"></i> Ask AI
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="lm-modal hidden" id="model3dModal">
    <div class="lm-modal__overlay" id="modalOverlay"></div>
    <div class="lm-modal__box">
      <div class="lm-modal__header">
        <div>
          <h3 id="modelTitle"></h3>
          <p id="modelSub"></p>
        </div>
        <button class="lm-modal__close" id="closeModal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="lm-modal__viewer">
        <div class="lm-modal__loading" id="modelLoading">
          <div class="lm-spinner"></div>
          <span>Loading 3D model...</span>
        </div>
        <iframe id="sketchfabFrame" src="" allow="autoplay; fullscreen; xr-spatial-tracking" allowfullscreen></iframe>
      </div>
      <div class="lm-modal__footer">
        <i class="fa-solid fa-cube"></i>
        <span>3D model provided by <strong>Sketchfab</strong> — drag to rotate, scroll to zoom</span>
      </div>
    </div>
  </div>

</div>

<script src="/javascript/landmarks.js"></script>
<script src="/javascript/header.js"></script>
</body>
</html>
